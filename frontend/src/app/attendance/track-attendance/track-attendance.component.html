<div class="row">

    <div class="card col-10 col-md-8 mx-auto mt-4 p-0 text-center border-darkblue">

        <div class="card-header bg-darkblue">
            <h5 class="card-title my-0">Track attendance</h5>
        </div>

        <div *ngIf="selectedDaycareGroup && dailyAttendance" class="card-body pt-4">

            <div *ngFor="let child of selectedDaycareGroup.children">
                <div class="row mb-2">

                    <div class="col">{{child.firstName}} {{child.lastName}}</div>

                    <div class="col">
                        <button class="btn btn-outline-darkblue"
                            *ngIf="dailyAttendance.presentChildrenIds.indexOf(child.id) != -1">
                            <i class="fa fa-check-square-o fa-lg"></i>
                        </button>
                        <button class="btn btn-outline-darkblue"
                            *ngIf="dailyAttendance.presentChildrenIds.indexOf(child.id) == -1">
                            <i class="fa fa-square fa-lg"></i>
                        </button>
                        Present
                    </div>

                    <div class="col">
                        <button class="btn btn-outline-purple"
                            *ngIf="dailyAttendance.absentChildrenIds.indexOf(child.id) != -1">
                            <i class="fa fa-check fa-lg"></i>
                        </button>
                        <button class="btn btn-outline-purple"
                            *ngIf="dailyAttendance.absentChildrenIds.indexOf(child.id) == -1">
                            <i class="fa fa-square-o fa-lg"></i>
                        </button>
                        Not present
                    </div>


                </div>
            </div>

        </div>

        <div *ngIf="!selectedDaycareGroup || !dailyAttendance" class="card-body pt-4">
            Please select date and daycare group for which you wish to track attendance.
        </div>

        <div class="card-footer">
            <div class="row justify-content-center">
                <button class="btn btn-outline-darkblue btn-block col-8 col-sm-5 col-lg-4 col-xl-3 mb-2"
                    (click)="openSelectModal(selectDateGroup)">
                    <span *ngIf="selectedDaycareGroup && dailyAttendance">Switch date/group</span>
                    <span *ngIf="!selectedDaycareGroup || !dailyAttendance">Select date/group</span>
                </button>
            </div>
        </div>

    </div>

</div>



<ng-template #selectDateGroup>

    <div class="modal-header bg-purple text-center">
        <h4 class="modal-title mx-auto">Select date and group</h4>
    </div>

    <form novalidate [formGroup]="selectDateAndGroupForm" (ngSubmit)="onSelect()">

        <div class="modal-body">

            <div class="form-group">
                <label>Date</label>
                <input #datepickerMDY="bsDatepicker" bsDatepicker class="form-control" formControlName="date"
                    [bsConfig]="{dateInputFormat: 'YYYY/MM/DD', containerClass:'theme-default'}" [daysDisabled]="[6,0]"
                    [minDate]="minDate" readonly>
            </div>

            <div class="form-group">
                <label>Daycare group</label>
                <select class="custom-select" formControlName="daycareGroup">
                    <option *ngFor="let daycareGroup of daycareGroups" [ngValue]="daycareGroup">
                        {{daycareGroup.groupName}}
                    </option>
                </select>
            </div>

        </div>

        <div class="modal-footer">
            <button type="submit" [disabled]="!selectDateAndGroupForm.valid" class="btn btn-outline-purple">
                Select
            </button>
            <button type="button" class="btn btn-outline-purple" (click)="modalRef.hide()">Cancel</button>
        </div>

    </form>

</ng-template>
