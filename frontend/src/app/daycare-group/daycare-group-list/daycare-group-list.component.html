<div *ngIf="daycareGroups else loadingDaycareGroups" class="row">

    <div class="card col-10 col-md-8 mx-auto my-5 p-0 text-center border-darkblue">

        <div class="card-header bg-darkblue">
            <h5 class="card-title my-0">List of daycare groups</h5>
        </div>

        <div class="card-body pt-4">

            <div class="table-responsive">
                <table class="table table-striped table-hover table-borderless text-center">

                    <thead>
                        <tr>
                            <th>Group name</th>
                            <th>Group Id</th>
                            <th>Group page</th>
                            <th>Delete group</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let group of daycareGroups">
                            <td>{{group.groupName}}</td>
                            <td>#{{group.id}}</td>
                            <td>
                                <button class="btn btn-outline-purple" [routerLink]="['/daycare-group-page',group.id]">
                                    Open
                                </button>
                            </td>
                            <td>
                                <button class="btn btn-outline-purple" (click)="deleteGroup(group)" [disabled]="!authenticationService.isUserAuthorized(['HEADMASTER'])">
                                    Delete
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>


<ng-template #loadingDaycareGroups>
    <div class="text-center my-5 mx-auto">
        <h2 class="heading-darkblue">Loading daycare groups data...</h2>
    </div>
</ng-template>
