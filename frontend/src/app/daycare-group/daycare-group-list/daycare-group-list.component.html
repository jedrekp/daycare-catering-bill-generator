<div class="text-center mx-auto my-4">
    <h2 class="heading-puprle">Daycare groups</h2>
</div>

<div class="row">

    <div class="card col-10 col-md-8 mx-auto p-0 text-center border-darkblue">

        <div class="card-header bg-darkblue">
            <h5 class="card-title my-0">Group count: {{daycareGroups.length}}</h5>
        </div>

        <div class="card-body pt-4">

            <div class="table-responsive">
                <table class="table table-hover table-borderless text-center">

                    <thead>
                        <tr>
                            <th>Group name</th>
                            <th>Group page</th>
                            <th>Delete group</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let group of daycareGroups">
                            <td>{{group.groupName}}</td>
                            <td>
                                <button class="btn btn-outline-purple" [routerLink]="['/daycare-group-page',group.id]">
                                    Open
                                </button>
                            </td>
                            <td>
                                <button class="btn btn-outline-purple" (click)="deleteGroup(group.id)">
                                    Delete
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
