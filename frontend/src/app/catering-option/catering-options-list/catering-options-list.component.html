<div class="col-md-5 mx-auto">

    <H2 class="text-center mb-3">Available catering options</H2>

    <table class="table table-striped table-dark text-center">
        <thead>
            <tr>
                <th>Option Name</th>
                <th>Daily cost</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>

            <ng-container *ngIf="!showDisabled">
                <tr *ngFor="let option of activeCateringOptions">
                    <td>{{option.optionName}}</td>
                    <td>{{option.dailyCost}} PLN</td>
                    <td>
                        <button class="btn btn-sm btn-info" (click)="openEditCateringOptionModal()">Edit option</button>
                    </td>
                </tr>
            </ng-container>

            <ng-container *ngIf="showDisabled">
                <tr *ngFor="let option of disabledCateringOptions">
                    <td>{{option.optionName}}</td>
                    <td>{{option.dailyCost}} PLN</td>
                    <td>
                        <button class="btn btn-sm btn-info" (click)="openEditCateringOptionModal()">Edit option</button>
                    </td>
                </tr>
            </ng-container>

        </tbody>
    </table>
</div>
