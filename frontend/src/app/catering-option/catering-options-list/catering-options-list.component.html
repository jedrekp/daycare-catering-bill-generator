<div class="row justify-content-end">
    <div class="col-md-2 mx-5 my-3">
        <button *ngIf="!showDisabled" class="btn btn-info btn-block" (click)="switchToDisabled()">Show disabled</button>
        <button *ngIf="showDisabled" class="btn btn-info btn-block" (click)="switchToActive()">Show active</button>
    </div>
</div>

<div class="col-md-8 mx-auto">

    <h3 class="text-center mb-3">{{header}}</h3>

    <table class="table table-striped table-dark text-center">
        <thead>
            <tr>
                <th>Option Name</th>
                <th>Daily cost</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>

            <ng-container *ngIf="!showDisabled">
                <tr *ngFor="let option of activeCateringOptions">
                    <td>{{option.optionName}}</td>
                    <td>{{option.dailyCost}} PLN</td>
                    <td>
                        <button class="btn btn-sm btn-outline-light" (click)="openEditCateringOptionModal(option)">Edit
                            option</button>
                    </td>
                </tr>
            </ng-container>

            <ng-container *ngIf="showDisabled">
                <tr *ngFor="let option of disabledCateringOptions">
                    <td>{{option.optionName}}</td>
                    <td>{{option.dailyCost}} PLN</td>
                    <td>
                        <button class="btn btn-sm btn-outline-light" (click)="openEditCateringOptionModal(option)">Edit
                            option</button>
                    </td>
                </tr>
            </ng-container>

        </tbody>
    </table>
</div>
