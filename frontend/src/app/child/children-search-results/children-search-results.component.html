<div *ngIf="children else loadingChildren" class="row">

    <div class="card col-10 col-md-8 mx-auto my-4 p-0 text-center border-darkblue">

        <div class="card-header bg-darkblue">
            <h5 class="card-title my-0">{{children.length}} matching
                <span *ngIf="children.length==1">result</span>
                <span *ngIf="children.length!=1">results</span>
            </h5>
        </div>

        <div class="card-body pt-4">

            <div class="table-responsive">
                <table class="table table-hover table-borderless table-striped text-center">

                    <thead>
                        <tr>
                            <th>First name</th>
                            <th>Last name</th>
                            <th>Child Id</th>
                            <th>Status</th>
                            <th>Child page</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let child of children">
                            <td>{{child.firstName}}</td>
                            <td>{{child.lastName}}</td>
                            <td>#{{child.id}}</td>
                            <td *ngIf="child.archived" class="text-secondary">Archived</td>
                            <td *ngIf="!child.archived" class="text-success">Active</td>
                            <td>
                                <button class="btn btn-outline-purple" [routerLink]="['/child-page',child.id]">
                                    Open
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<ng-template #loadingChildren>
    <div class="text-center my-5 mx-auto">
        <h2 class="heading-darkblue">Loading children data...</h2>
    </div>
</ng-template>
