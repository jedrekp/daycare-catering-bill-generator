<div *ngIf="children else loadingChildren" class="row">

    <div class="card col-10 col-md-8 mx-auto my-5 p-0 text-center border-darkblue">

        <div class="card-header bg-darkblue">
            <h5 class="card-title my-0">Unassigned children</h5>
        </div>

        <div class="card-body pt-4">

            <div class="table-responsive">
                <table class="table table-hover table-borderless table-striped text-center">

                    <thead>
                        <tr>
                            <th>First name</th>
                            <th>Last name</th>
                            <th>Child Id</th>
                            <th>Child page</th>
                            <th>Assign to daycare group</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let child of children">
                            <td>{{child.firstName}}</td>
                            <td>{{child.lastName}}</td>
                            <td>#{{child.id}}</td>
                            <td>
                                <button class="btn btn-outline-purple" [routerLink]="['/child-page',child.id]">
                                    Open
                                </button>
                            </td>
                            <td>
                                <button class="btn btn-outline-purple" (click)="openAssignChildToGroupModal(child)"
                                    [disabled]="!authenticationService.isUserAuthorized(['HEADMASTER'])">
                                    Assign
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<ng-template #loadingChildren>
    <div class="text-center my-5 mx-auto">
        <h2 class="heading-darkblue">Loading children data...</h2>
    </div>
</ng-template>
