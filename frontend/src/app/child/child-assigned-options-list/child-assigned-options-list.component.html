<div class="card mb-4 px-0 border-darkblue text-center" id="assigned-options-card">

    <div class="card-header bg-darkblue">
        <h5 class="card-title my-0">Assigned Catering Options</h5>
    </div>

    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-borderless table-striped mb-0 table-hover">
                <thead>
                    <tr>
                        <th>Effective From</th>
                        <th>Option name</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let assignedOption of child.assignedOptions">
                        <td >{{assignedOption.effectiveDate}}</td>
                        <td>{{assignedOption.cateringOption.optionName}}</td>
                        <td>
                            <button class="btn btn-outline-purple"
                                (click)="removeAssignedOption(assignedOption)" [disabled]="child.archived || !authenticationService.isUserAuthorized(['HEADMASTER'])">
                                Delete</button>
                        </td>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card-footer">

        <div class="row justify-content-center">
            <button class="btn btn-outline-darkblue btn-block col-8 col-md-6 col-lg-5 col-xl-4"
                (click)="openAssignNewOptionModal()" [disabled]="child.archived || !authenticationService.isUserAuthorized(['HEADMASTER'])">
                Assign new option
            </button>
        </div>

    </div>

</div>
