<div *ngIf="child" class="col-md-5 mx-auto">

    <h2 class="text-center my-3">Child #{{child.id}}</h2>


    <table class="table text-center">
        <tbody>
            <tr>
                <th>First name:</th>
                <td>{{child.firstName}}</td>
            </tr>
            <tr>
                <th>Last name:</th>
                <td>{{child.lastName}}</td>
            </tr>
            <tr>
                <th>Daycare group:</th>
                <td>
                    <span *ngIf="child.daycareGroup">{{child.daycareGroup.groupName}} </span>
                    <span *ngIf="!child.daycareGroup">unassigned</span>
                </td>
            </tr>
        </tbody>
    </table>


    <button class="btn btn-sm btn-success mx-auto" (click)="openEditChildModal()">Edit basic info</button>

    <button class="btn btn-sm btn-info mx-auto float-right" (click)="openAssignChildToGroupModal()">
        Assign to group
    </button>


    <h4 class="text-center my-3">Assigned catering options</h4>

    <table class="table table-striped text-center">
        <thead>
            <tr>
                <th>Effective from</th>
                <th>Option Name</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let assignedOption of child.assignedOptions">
                <td>{{assignedOption.effectiveDate}}</td>
                <td>{{assignedOption.cateringOption.optionName}}</td>
                <td>
                    <button class="btn btn-sm btn-danger"
                        (click)="removeAssignedOption(assignedOption.id)">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>

    <button class="btn btn-sm btn-info mx-auto float-right" (click)="openAssignNewOptionModal()">
        Assign new option
    </button>

</div>
